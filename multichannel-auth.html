
<!DOCTYPE html>
<html>
<head>
  <title></title>
  <script>
    function base64url(source) {
      return btoa(JSON.stringify(source))
        .replace(/=/g, '')
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
    }


  (function() {
    var ns = document.createElement('script');
    ns.src = ('https://chatapps-qa-a.netomi.com/app/script.js');ns.type = 'text/javascript'; ns.async = true;
    ns.setAttribute('botRefId', 'a69debff-1dff-407e-9d1d-77a3ad111647');

    const queryString = window.location.search;
    const params = new URLSearchParams(queryString);
    const conversationId = params.get('convId');
    const phoneNumber = params.get('phoneNumber');
    ns.setAttribute('convId', conversationId);

    const header = { alg: "HS256", typ: "JWT" }
    const payload = { sub: phoneNumber }
    const token = base64url(header) + "." + base64url(payload) + ".";
    

    var s = document.getElementsByTagName('script')[0];s.parentNode.insertBefore(ns, s);
    ns.onload = function () {
        window.Netomi.chat.init(() => {
          console.log(token);
          Netomi.chat.oauth.login({ access_token: token });
          Netomi.chat.openWidget();
        });
    }
    })();
</script>


<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body, html {
  height: 100%;
  margin: 0;
}

.bg {
  /* The image used */
  background-image: url("https://demo.netomi.com/web/WBG/verizon.png");

  /* Full height */
  height: 100%; 

  /* Center and scale the image nicely */
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
}
</style>
</head>
<body>

<div class="bg"></div>
</body>
</html>
